<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match 3 - Jewel Blast</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --primary: #6366f1; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; touch-action: manipulation; }
        
        .stat-bar { 
            background: var(--panel); padding: 15px; border-radius: 16px; 
            display: flex; justify-content: space-around; max-width: 400px; 
            margin: 10px auto; border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-item { display: flex; flex-direction: column; }
        .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 20px; font-weight: bold; }

        #game-grid { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; 
            max-width: 400px; margin: 20px auto; background: rgba(255,255,255,0.03); 
            padding: 10px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.05);
        }
        
        .gem { 
            aspect-ratio: 1; border-radius: 25%; cursor: pointer; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 -4px 6px rgba(0,0,0,0.2);
        }
        .gem.selected { transform: scale(1.15); box-shadow: 0 0 20px #fff; outline: 3px solid white; z-index: 10; }
        
        /* High-quality gradients for Gems */
        .g-0 { background: linear-gradient(135deg, #ff6b6b, #ee5253); } /* Red */
        .g-1 { background: linear-gradient(135deg, #48dbfb, #2e86de); } /* Blue */
        .g-2 { background: linear-gradient(135deg, #1dd1a1, #10ac84); } /* Green */
        .g-3 { background: linear-gradient(135deg, #feca57, #ff9f43); } /* Orange */
        .g-4 { background: linear-gradient(135deg, #a29bfe, #6c5ce7); } /* Purple */
        .g-5 { background: linear-gradient(135deg, #ff9ff3, #f368e0); } /* Pink */

        .btn-restart { 
            background: var(--primary); color: white; border: none; padding: 12px 40px; 
            border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer;
            margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .btn-restart:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="letter-spacing: 2px;">LOADING ENGINE...</div>
    </div>

    <div class="stat-bar">
        <div class="stat-item">
            <span class="label">Score</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="stat-item">
            <span class="label">Target</span>
            <span class="value">2500</span>
        </div>
    </div>

    <div id="game-grid"></div>
    
    <button class="btn-restart" id="restart">RESTART GAME</button>

    <script type="py">
        from pyscript import document, window
        import random, asyncio

        GRID_SIZE = 8
        TYPES = 6
        board = []
        selected = None
        is_animating = False
        score = 0

        async def init_game():
            global board, score, selected, is_animating
            score = 0
            selected = None
            is_animating = False
            document.getElementById("score").innerText = "0"
            
            # Init board without pre-existing matches
            while True:
                board = [[random.randint(0, TYPES-1) for _ in range(GRID_SIZE)] for _ in range(GRID_SIZE)]
                if not find_matches():
                    break
            
            render_board()
            document.getElementById("loading").style.display = "none"

        def find_matches():
            matches = set()
            # Horizontal check
            for r in range(GRID_SIZE):
                for c in range(GRID_SIZE - 2):
                    if board[r][c] == board[r][c+1] == board[r][c+2] and board[r][c] != -1:
                        matches.update({(r, c), (r, c+1), (r, c+2)})
            # Vertical check
            for c in range(GRID_SIZE):
                for r in range(GRID_SIZE - 2):
                    if board[r][c] == board[r+1][c] == board[r+2][c] and board[r][c] != -1:
                        matches.update({(r, c), (r+1, c), (r+2, c)})
            return list(matches)

        def render_board():
            grid_div = document.getElementById("game-grid")
            grid_div.innerHTML = ""
            for r in range(GRID_SIZE):
                for c in range(GRID_SIZE):
                    gem = document.createElement("div")
                    val = board[r][c]
                    gem.className = f"gem g-{val}" if val != -1 else "gem"
                    if val == -1: gem.style.opacity = "0"
                    
                    if selected == (r, c):
                        gem.classList.add("selected")
                    
                    def make_handler(row, col):
                        async def handler(e):
                            await handle_click(row, col)
                        return handler
                    
                    gem.onclick = make_handler(r, c)
                    grid_div.appendChild(gem)

        async def handle_click(r, c):
            global selected, is_animating, score
            if is_animating: return
            
            if selected is None:
                selected = (r, c)
                render_board()
            else:
                r1, c1 = selected
                if abs(r-r1) + abs(c-c1) == 1:
                    is_animating = True
                    # Swap
                    board[r][c], board[r1][c1] = board[r1][c1], board[r][c]
                    selected = None
                    render_board()
                    
                    await asyncio.sleep(0.3)
                    
                    if not await process_logic():
                        # Swap back if no matches
                        board[r][c], board[r1][c1] = board[r1][c1], board[r][c]
                        render_board()
                    
                    is_animating = False
                else:
                    selected = (r, c)
                    render_board()

        async def process_logic():
            global score
            had_matches = False
            while True:
                matches = find_matches()
                if not matches: break
                
                had_matches = True
                score += len(matches) * 10
                document.getElementById("score").innerText = str(score)
                
                # Clear matches
                for r, c in matches:
                    board[r][c] = -1
                render_board()
                await asyncio.sleep(0.3)
                
                # Drop gems
                for c in range(GRID_SIZE):
                    write_idx = GRID_SIZE - 1
                    for r in range(GRID_SIZE - 1, -1, -1):
                        if board[r][c] != -1:
                            board[write_idx][c] = board[r][c]
                            write_idx -= 1
                    for r in range(write_idx, -1, -1):
                        board[r][c] = random.randint(0, TYPES-1)
                
                render_board()
                await asyncio.sleep(0.3)
            return had_matches

        async def restart_game(e):
            document.getElementById("loading").style.display = "flex"
            await init_game()

        document.getElementById("restart").onclick = restart_game
        asyncio.ensure_future(init_game())
    </script>
</body>
</html>
