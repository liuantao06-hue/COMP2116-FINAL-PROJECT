<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris - Python Retro</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #6366f1; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; }
        
        .game-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .stat-bar { 
            background: var(--panel); padding: 10px 20px; border-radius: 12px; 
            display: flex; justify-content: space-between; width: 240px; 
            border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box;
        }

        canvas { 
            background: #000; border: 4px solid var(--panel); 
            border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        button { 
            background: var(--panel); color: white; border: 1px solid #334155; 
            padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
            touch-action: manipulation;
        }
        button:active { background: var(--accent); transform: scale(0.95); }
        .btn-large { grid-column: span 3; background: var(--accent); border: none; }
        
        #game-over { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 41, 59, 0.95); padding: 20px; border-radius: 16px;
            display: none; border: 2px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h2>TETRIS</h2>
        
        <div class="stat-bar">
            <span>Score: <b id="score">0</b></span>
            <span>Target: <b>500</b></span>
        </div>

        <div style="position: relative;">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div id="game-over">
                <h3>GAME OVER</h3>
                <button onclick="location.reload()">TRY AGAIN</button>
            </div>
        </div>

        <div class="controls">
            <button id="up">ROTATE</button>
            <div></div>
            <button id="restart">RESET</button>
            
            <button id="left">LEFT</button>
            <button id="down">DOWN</button>
            <button id="right">RIGHT</button>
        </div>
    </div>

    <script type="py">
        from pyscript import document, window
        import random, asyncio

        SHAPES = [
            [[1, 1, 1, 1]], # I
            [[1, 1], [1, 1]], # O
            [[0, 1, 0], [1, 1, 1]], # T
            [[1, 0, 0], [1, 1, 1]], # L
            [[0, 0, 1], [1, 1, 1]], # J
            [[0, 1, 1], [1, 1, 0]], # S
            [[1, 1, 0], [0, 1, 1]]  # Z
        ]

        class Tetris:
            def __init__(self):
                self.canvas = document.getElementById("tetris")
                self.ctx = self.canvas.getContext("2d")
                self.reset()

            def reset(self):
                self.grid = [[0]*12 for _ in range(20)]
                self.score = 0
                self.game_over = False
                self.current_piece = self.new_piece()
                self.pos = [0, 4] # Row, Col
                self.update_score()
                document.getElementById("game-over").style.display = "none"

            def new_piece(self):
                return random.choice(SHAPES)

            def collide(self, dr, dc, piece=None):
                if piece is None: piece = self.current_piece
                for r, row in enumerate(piece):
                    for c, val in enumerate(row):
                        if val:
                            new_r, new_c = self.pos[0] + r + dr, self.pos[1] + c + dc
                            if new_c < 0 or new_c >= 12 or new_r >= 20: return True
                            if new_r >= 0 and self.grid[new_r][new_c]: return True
                return False

            def rotate(self):
                rotated = [list(row) for row in zip(*self.current_piece[::-1])]
                if not self.collide(0, 0, rotated):
                    self.current_piece = rotated

            def merge(self):
                for r, row in enumerate(self.current_piece):
                    for c, val in enumerate(row):
                        if val:
                            self.grid[self.pos[0] + r][self.pos[1] + c] = 1
                self.clear_lines()

            def clear_lines(self):
                new_grid = [row for row in self.grid if not all(row)]
                lines_cleared = 20 - len(new_grid)
                if lines_cleared:
                    self.score += lines_cleared * 100
                    for _ in range(lines_cleared):
                        new_grid.insert(0, [0]*12)
                    self.grid = new_grid
                    self.update_score()

            def move(self, dr, dc):
                if not self.collide(dr, dc):
                    self.pos[0] += dr
                    self.pos[1] += dc
                    return True
                if dr > 0: # Hit floor
                    self.merge()
                    self.pos = [0, 4]
                    self.current_piece = self.new_piece()
                    if self.collide(0, 0):
                        self.game_over = True
                        document.getElementById("game-over").style.display = "block"
                return False

            def draw(self):
                self.ctx.clearRect(0, 0, 240, 400)
                # Draw Grid
                for r, row in enumerate(self.grid):
                    for c, val in enumerate(row):
                        if val: self.draw_block(r, c, "#475569")
                # Draw Active Piece
                for r, row in enumerate(self.current_piece):
                    for c, val in enumerate(row):
                        if val: self.draw_block(self.pos[0]+r, self.pos[1]+c, "#6366f1")

            def draw_block(self, r, c, color):
                self.ctx.fillStyle = color
                self.ctx.fillRect(c*20, r*20, 19, 19)

            def update_score(self):
                document.getElementById("score").innerText = str(self.score)

        game = Tetris()

        async def game_loop():
            while True:
                if not game.game_over:
                    game.move(1, 0)
                    game.draw()
                await asyncio.sleep(0.5)

        def handle_key(e):
            if game.game_over: return
            if e.key == "ArrowLeft": game.move(0, -1)
            elif e.key == "ArrowRight": game.move(0, 1)
            elif e.key == "ArrowDown": game.move(1, 0)
            elif e.key == "ArrowUp": game.rotate()
            game.draw()

        # Input Bindings
        document.addEventListener("keydown", handle_key)
        document.getElementById("left").onclick = lambda e: (game.move(0, -1), game.draw())
        document.getElementById("right").onclick = lambda e: (game.move(0, 1), game.draw())
        document.getElementById("down").onclick = lambda e: (game.move(1, 0), game.draw())
        document.getElementById("up").onclick = lambda e: (game.rotate(), game.draw())
        document.getElementById("restart").onclick = lambda e: game.reset()
        
        asyncio.create_task(game_loop())
    </script>
</body>
</html>
