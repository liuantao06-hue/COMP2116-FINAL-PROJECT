<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Open Source Python</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --cell-empty: rgba(238, 228, 218, 0.35);
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background: var(--bg-color);
            color: var(--text-dark);
            font-family: "Clear Sans", Arial, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            touch-action: none; /* 关键：禁止浏览器默认滑动 */
        }

        .header { width: 320px; display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .score-box { background: var(--grid-bg); padding: 5px 20px; border-radius: 6px; color: white; text-align: center; }

        #grid {
            width: 320px; height: 320px; background: var(--grid-bg);
            border-radius: 6px; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; padding: 12px; box-sizing: border-box;
        }

        .cell {
            width: 65px; height: 65px; background: var(--cell-empty);
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: bold; transition: all 0.1s ease;
        }

        /* 经典 2048 配色表 */
        .n-2 { background: #eee4da; color: var(--text-dark); }
        .n-4 { background: #ede0c8; color: var(--text-dark); }
        .n-8 { background: #f2b179; color: white; }
        .n-16 { background: #f59563; color: white; }
        .n-32 { background: #f67c5f; color: white; }
        .n-64 { background: #f65e3b; color: white; }
        .n-128 { background: #edcf72; color: white; font-size: 20px; }
        .n-256 { background: #edcc61; color: white; font-size: 20px; }
        .n-512 { background: #edc850; color: white; font-size: 20px; }
        .n-1024 { background: #edc53f; color: white; font-size: 16px; }
        .n-2048 { background: #edc22e; color: white; font-size: 16px; }

        .btn { margin-top: 20px; padding: 10px 30px; background: #8f7a66; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 40px; margin: 0;">2048</h1>
        <div class="score-box">
            <div style="font-size: 12px;">SCORE</div>
            <div id="score" style="font-size: 20px; font-weight: bold;">0</div>
        </div>
    </div>

    <div id="grid"></div>

    <button class="btn" id="restart">重新开始</button>

    <script type="py">
        from pyscript import document, window
        import random

        class Game:
            def __init__(self):
                self.board = [[0]*4 for _ in range(4)]
                self.score = 0
                self.reset()

            def reset(self):
                self.board = [[0]*4 for _ in range(4)]
                self.score = 0
                self.add_tile()
                self.add_tile()
                self.render()

            def add_tile(self):
                empty = [(r, c) for r in range(4) for c in range(4) if self.board[r][c] == 0]
                if empty:
                    r, c = random.choice(empty)
                    self.board[r][c] = 2 if random.random() < 0.9 else 4

            def render(self):
                grid_div = document.getElementById("grid")
                grid_div.innerHTML = ""
                for r in range(4):
                    for c in range(4):
                        val = self.board[r][c]
                        cell = document.createElement("div")
                        cell.className = f"cell n-{val}" if val else "cell"
                        cell.innerText = str(val) if val else ""
                        grid_div.appendChild(cell)
                document.getElementById("score").innerText = str(self.score)

            def _merge_row(self, row):
                # 开源经典合并逻辑：先挤压 -> 合并 -> 再挤压
                non_zeros = [x for x in row if x != 0]
                new_row = []
                skip = False
                for i in range(len(non_zeros)):
                    if skip:
                        skip = False
                        continue
                    if i + 1 < len(non_zeros) and non_zeros[i] == non_zeros[i+1]:
                        val = non_zeros[i] * 2
                        new_row.append(val)
                        self.score += val
                        skip = True
                    else:
                        new_row.append(non_zeros[i])
                return new_row + [0] * (4 - len(new_row))

            def move(self, direction):
                # 0:left, 1:down, 2:right, 3:up
                # 旋转法简化逻辑：把所有方向都转换成“向左移动”
                def rotate(matrix):
                    return [list(row) for row in zip(*matrix[::-1])]

                new_board = [r[:] for r in self.board]
                for _ in range(direction):
                    new_board = rotate(new_board)

                changed = False
                for i in range(4):
                    merged = self._merge_row(new_board[i])
                    if merged != new_board[i]:
                        changed = True
                    new_board[i] = merged

                for _ in range((4 - direction) % 4):
                    new_board = rotate(new_board)

                if changed:
                    self.board = new_board
                    self.add_tile()
                    self.render()

        game = Game()

        # PC 端键盘控制
        def on_keydown(e):
            d = {"ArrowLeft": 0, "ArrowDown": 1, "ArrowRight": 2, "ArrowUp": 3}
            if e.key in d:
                e.preventDefault()
                game.move(d[e.key])

        # 移动端滑动控制
        ts_x, ts_y = 0, 0
        def on_touchstart(e):
            global ts_x, ts_y
            ts_x = e.touches.item(0).clientX
            ts_y = e.touches.item(0).clientY

        def on_touchend(e):
            dx = e.changedTouches.item(0).clientX - ts_x
            dy = e.changedTouches.item(0).clientY - ts_y
            if abs(dx) > 30 or abs(dy) > 30:
                if abs(dx) > abs(dy):
                    game.move(0 if dx < 0 else 2)
                else:
                    game.move(3 if dy < 0 else 1)

        document.addEventListener("keydown", on_keydown)
        document.addEventListener("touchstart", on_touchstart)
        document.addEventListener("touchend", on_touchend)
        document.getElementById("restart").onclick = lambda e: game.reset()
    </script>
</body>
</html>
