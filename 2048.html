<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Python Cross-Platform</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background: #faf8ef; color: #776e65; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow: hidden; touch-action: none; }
        .header { display: flex; justify-content: space-between; width: 320px; align-items: center; margin-bottom: 10px; }
        .score-container { background: #bbada0; padding: 10px 20px; border-radius: 6px; color: white; font-weight: bold; }
        #grid { width: 300px; height: 300px; background: #bbada0; border-radius: 6px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; position: relative; }
        .cell { background: rgba(238, 228, 218, 0.35); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; transition: all 0.1s ease; }
        /* 颜色增强 */
        .n-2 { background: #eee4da; color: #776e65; } .n-4 { background: #ede0c8; color: #776e65; }
        .n-8 { background: #f2b179; color: white; } .n-16 { background: #f59563; color: white; }
        .n-32 { background: #f67c5f; color: white; } .n-64 { background: #f65e3b; color: white; }
        .n-128 { background: #edcf72; color: white; font-size: 20px; } .n-256 { background: #edcc61; color: white; font-size: 20px; }
        
        .btn { padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .hint { margin-top: 15px; font-size: 14px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; font-size: 32px;">2048</h1>
        <div class="score-container">得分: <span id="score">0</span></div>
    </div>

    <div id="grid"></div>

    <div style="margin-top: 20px;">
        <button class="btn" id="restart">重置游戏</button>
    </div>

    <p class="hint">电脑按箭头键，手机直接滑动屏幕</p>

    <script type="py">
        from pyscript import document, window
        import random

        board = [[0]*4 for _ in range(4)]
        score = 0
        
        # 记录触摸坐标
        touch_start_x = 0
        touch_start_y = 0

        def init_game():
            global board, score
            board = [[0]*4 for _ in range(4)]
            score = 0
            add_tile()
            add_tile()
            render()

        def add_tile():
            empty = [(r, c) for r in range(4) for c in range(4) if board[r][c] == 0]
            if empty:
                r, c = random.choice(empty)
                board[r][c] = 2 if random.random() < 0.9 else 4

        def render():
            grid = document.getElementById("grid")
            grid.innerHTML = ""
            for r in range(4):
                for c in range(4):
                    v = board[r][c]
                    div = document.createElement("div")
                    div.className = f"cell n-{v}" if v else "cell"
                    div.innerText = str(v) if v else ""
                    grid.appendChild(div)
            document.getElementById("score").innerText = str(score)

        def move(direction):
            global board, score
            # 0:left, 1:down, 2:right, 3:up
            def rotate(b): return [list(r) for r in zip(*b[::-1])]
            
            temp_board = [row[:] for row in board]
            for _ in range(direction): temp_board = rotate(temp_board)
            
            moved = False
            new_board = []
            for row in temp_board:
                line = [x for x in row if x != 0]
                for i in range(len(line)-1):
                    if line[i] == line[i+1]:
                        line[i] *= 2
                        score += line[i]
                        line[i+1] = 0
                line = [x for x in line if x != 0]
                line += [0] * (4 - len(line))
                if line != row: moved = True
                new_board.append(line)
            
            for _ in range((4 - direction) % 4): new_board = rotate(new_board)
            
            if moved:
                board = new_board
                add_tile()
                render()

        # 键盘事件
        def on_key(e):
            d = {"ArrowLeft":0, "ArrowDown":1, "ArrowRight":2, "ArrowUp":3}
            if e.key in d:
                e.preventDefault()
                move(d[e.key])

        # 触摸开始
        def on_touch_start(e):
            global touch_start_x, touch_start_y
            touch_start_x = e.touches.item(0).clientX
            touch_start_y = e.touches.item(0).clientY

        # 触摸结束：判断滑动方向
        def on_touch_end(e):
            global touch_start_x, touch_start_y
            end_x = e.changedTouches.item(0).clientX
            end_y = e.changedTouches.item(0).clientY
            
            dx = end_x - touch_start_x
            dy = end_y - touch_start_y
            
            # 设置滑动阈值，防止误触
            if abs(dx) < 30 and abs(dy) < 30:
                return

            if abs(dx) > abs(dy):
                # 横向滑动
                move(0 if dx < 0 else 2)
            else:
                # 纵向滑动
                move(3 if dy < 0 else 1)

        # 绑定事件
        document.addEventListener("keydown", on_key)
        document.addEventListener("touchstart", on_touch_start)
        document.addEventListener("touchend", on_touch_end)
        document.getElementById("restart").onclick = lambda e: init_game()
        
        init_game()
    </script>
</body>
</html>
