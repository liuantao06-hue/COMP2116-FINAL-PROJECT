<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Pro Fix</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #faf8ef; --grid: #bbada0; --cell: rgba(238, 228, 218, 0.35); --dark: #776e65; }
        body { background: var(--bg); color: var(--dark); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        .header { width: 300px; display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .score-box { background: var(--grid); padding: 5px 15px; border-radius: 6px; color: white; text-align: center; min-width: 80px; }
        #grid { width: 300px; height: 300px; background: var(--grid); border-radius: 6px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; }
        .cell { width: 62.5px; height: 62.5px; background: var(--cell); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; transition: 0.1s; }
        .n-2 { background: #eee4da; color: var(--dark); } .n-4 { background: #ede0c8; color: var(--dark); }
        .n-8 { background: #f2b179; color: white; } .n-16 { background: #f59563; color: white; }
        .n-32 { background: #f67c5f; color: white; } .n-64 { background: #f65e3b; color: white; }
        .n-128 { background: #edcf72; color: white; font-size: 18px; } .n-256 { background: #edcc61; color: white; font-size: 18px; }
        .btn { margin-top: 20px; padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; transition: 0.5s; }
    </style>
</head>
<body>
    <div id="loading-mask"><h1>Python 引擎启动中...</h1></div>

    <div class="header">
        <h1 style="margin:0">2048</h1>
        <div class="score-box">
            <div style="font-size:10px">SCORE</div>
            <div id="score">0</div>
        </div>
    </div>
    <div id="grid"></div>
    <button class="btn" id="restart">New Game</button>

    <script type="py">
        from pyscript import document, window
        import random

        class Game2048:
            def __init__(self):
                self.board = [[0]*4 for _ in range(4)]
                self.score = 0
                self.reset()

            def reset(self):
                self.board = [[0]*4 for _ in range(4)]
                self.score = 0
                self.add_tile()
                self.add_tile()
                self.render()

            def add_tile(self):
                empty = [(r, c) for r in range(4) for c in range(4) if self.board[r][c] == 0]
                if empty:
                    r, c = random.choice(empty)
                    self.board[r][c] = 2 if random.random() < 0.9 else 4

            def render(self):
                grid = document.getElementById("grid")
                grid.innerHTML = ""
                for r in range(4):
                    for c in range(4):
                        v = self.board[r][c]
                        div = document.createElement("div")
                        div.className = f"cell n-{v}" if v else "cell"
                        div.innerText = str(v) if v else ""
                        grid.appendChild(div)
                document.getElementById("score").innerText = str(self.score)

            def move(self, direction):
                # 0:left, 1:down, 2:right, 3:up
                def rotate(m): return [list(row) for row in zip(*m[::-1])]
                
                temp = [r[:] for r in self.board]
                for _ in range(direction): temp = rotate(temp)
                
                changed = False
                for i in range(4):
                    row = [x for x in temp[i] if x != 0]
                    new_row = []
                    skip = False
                    for j in range(len(row)):
                        if skip:
                            skip = False
                            continue
                        if j+1 < len(row) and row[j] == row[j+1]:
                            new_val = row[j] * 2
                            new_row.append(new_val)
                            self.score += new_val
                            skip = True
                            changed = True
                        else:
                            new_row.append(row[j])
                    new_row += [0] * (4 - len(new_row))
                    if new_row != temp[i]: changed = True
                    temp[i] = new_row
                
                for _ in range((4 - direction) % 4): temp = rotate(temp)
                
                if changed:
                    self.board = temp
                    self.add_tile()
                    self.render()

        game = Game2048()
        document.getElementById("loading-mask").style.display = "none"

        def on_key(e):
            d = {"ArrowLeft": 0, "ArrowDown": 1, "ArrowRight": 2, "ArrowUp": 3}
            if e.key in d:
                e.preventDefault()
                game.move(d[e.key])

        tx, ty = 0, 0
        def ts(e):
            global tx, ty
            tx, ty = e.touches.item(0).clientX, e.touches.item(0).clientY
        def te(e):
            dx = e.changedTouches.item(0).clientX - tx
            dy = e.changedTouches.item(0).clientY - ty
            if abs(dx) > 20 or abs(dy) > 20:
                if abs(dx) > abs(dy): game.move(0 if dx < 0 else 2)
                else: game.move(3 if dy < 0 else 1)

        document.addEventListener("keydown", on_key)
        document.addEventListener("touchstart", ts)
        document.addEventListener("touchend", te)
        document.getElementById("restart").onclick = lambda e: game.reset()
    </script>
</body>
</html>
