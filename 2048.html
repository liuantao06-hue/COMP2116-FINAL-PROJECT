<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Ultra Fix</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --bg: #faf8ef; --grid: #bbada0; --cell: rgba(238, 228, 218, 0.35); --text: #776e65; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; touch-action: none; overflow: hidden; }
        .header { width: 300px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .score-box { background: var(--grid); padding: 5px 15px; border-radius: 6px; color: white; text-align: center; }
        #grid { width: 300px; height: 300px; background: var(--grid); border-radius: 6px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; margin-top: 20px; }
        .cell { width: 62px; height: 62px; background: var(--cell); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .n-2 { background: #eee4da; color: var(--text); } .n-4 { background: #ede0c8; color: var(--text); }
        .n-8 { background: #f2b179; color: white; } .n-16 { background: #f59563; color: white; }
        .n-32 { background: #f67c5f; color: white; } .n-64 { background: #f65e3b; color: white; }
        .n-128 { background: #edcf72; color: white; font-size: 20px; }
        .restart-btn { margin-top: 20px; padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0">2048</h1>
        <div class="score-box">SCORE: <span id="score">0</span></div>
    </div>
    <div id="grid"></div>
    <div id="status">Loading Engine...</div>
    <button class="restart-btn" id="restart">New Game</button>

    <script type="py">
        from pyscript import document, window
        import random

        class Game:
            def __init__(self):
                self.board = [[0]*4 for _ in range(4)]
                self.score = 0
                self.start()

            def start(self):
                self.board = [[0]*4 for _ in range(4)]
                self.score = 0
                self.add_tile()
                self.add_tile()
                self.draw()

            def add_tile(self):
                empty = [(r, c) for r in range(4) for c in range(4) if self.board[r][c] == 0]
                if empty:
                    r, c = random.choice(empty)
                    self.board[r][c] = 2 if random.random() < 0.9 else 4

            def draw(self):
                g = document.getElementById("grid")
                g.innerHTML = ""
                for r in range(4):
                    for c in range(4):
                        v = self.board[r][c]
                        d = document.createElement("div")
                        d.className = f"cell n-{v}" if v else "cell"
                        d.innerText = str(v) if v else ""
                        g.appendChild(d)
                document.getElementById("score").innerText = str(self.score)

            def slide(self, row):
                new_row = [x for x in row if x != 0]
                for i in range(len(new_row)-1):
                    if new_row[i] == new_row[i+1]:
                        new_row[i] *= 2
                        self.score += new_row[i]
                        new_row[i+1] = 0
                new_row = [x for x in new_row if x != 0]
                return new_row + [0]*(4-len(new_row))

            def move(self, dir):
                # 0:left, 1:up, 2:right, 3:down
                old = [r[:] for r in self.board]
                if dir in [0, 2]: # Horizontal
                    for i in range(4):
                        row = self.board[i] if dir == 0 else self.board[i][::-1]
                        res = self.slide(row)
                        self.board[i] = res if dir == 0 else res[::-1]
                else: # Vertical
                    for c in range(4):
                        col = [self.board[r][c] for r in range(4)] if dir == 1 else [self.board[r][c] for r in range(4)][::-1]
                        res = self.slide(col)
                        if dir == 3: res = res[::-1]
                        for r in range(4): self.board[r][c] = res[r]
                
                if old != self.board:
                    self.add_tile()
                    self.draw()

        game = Game()
        document.getElementById("status").innerText = "Ready to Play!"

        # 控制逻辑
        def handle_key(e):
            keys = {"ArrowLeft":0, "ArrowUp":1, "ArrowRight":2, "ArrowDown":3}
            if e.key in keys:
                e.preventDefault()
                game.move(keys[e.key])

        start_x = start_y = 0
        def touch_start(e):
            global start_x, start_y
            start_x = e.touches.item(0).clientX
            start_y = e.touches.item(0).clientY
            e.preventDefault()

        def touch_end(e):
            dx = e.changedTouches.item(0).clientX - start_x
            dy = e.changedTouches.item(0).clientY - start_y
            if abs(dx) > 30 or abs(dy) > 30:
                if abs(dx) > abs(dy): game.move(0 if dx < 0 else 2)
                else: game.move(1 if dy < 0 else 3)
            e.preventDefault()

        document.addEventListener("keydown", handle_key)
        document.addEventListener("touchstart", touch_start, {"passive": False})
        document.addEventListener("touchend", touch_end, {"passive": False})
        document.getElementById("restart").onclick = lambda e: game.start()
    </script>
</body>
</html>
