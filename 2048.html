<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Python Pro</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root {
            --bg: #faf8ef; --grid: #bbada0; --text: #776e65;
        }
        body {
            background: var(--bg); color: var(--text); font-family: sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            touch-action: none; /* 防止手机浏览器下拉刷新 */
        }
        .header { width: 90%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .score-box { background: #bbada0; padding: 10px; border-radius: 6px; color: white; min-width: 80px; text-align: center; }
        
        #grid-container {
            width: 320px; height: 320px; background: var(--grid);
            border-radius: 6px; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; padding: 10px; margin-top: 20px; position: relative;
        }
        @media (min-width: 450px) { #grid-container { width: 400px; height: 400px; } }

        .cell {
            background: rgba(238, 228, 218, 0.35); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; transition: 0.1s;
        }
        /* 数字颜色逻辑 */
        .n-2 { background: #eee4da; color: #776e65; }
        .n-4 { background: #ede0c8; color: #776e65; }
        .n-8 { background: #f2b179; color: white; }
        .n-16 { background: #f59563; color: white; }
        .n-32 { background: #f67c5f; color: white; }
        .n-64 { background: #f65e3b; color: white; }
        .n-128 { background: #edcf72; color: white; font-size: 20px; }
        .n-256 { background: #edcc61; color: white; font-size: 20px; }
        .n-512 { background: #edc850; color: white; font-size: 20px; }
        .n-1024 { background: #edc53f; color: white; font-size: 16px; }
        .n-2048 { background: #edc22e; color: white; font-size: 16px; }

        .btn {
            margin-top: 20px; padding: 10px 20px; background: #8f7a66;
            color: white; border: none; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 1rem;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0">2048</h1>
        <div class="score-box">
            <div style="font-size: 12px;">SCORE</div>
            <div id="score">0</div>
        </div>
    </div>

    <div id="grid-container"></div>

    <button class="btn" id="reset-btn">再来一局</button>
    <p style="font-size: 12px; margin-top: 15px;">电脑：方向键 | 手机：滑动屏幕</p>

    <script type="py">
        from pyscript import document, window
        import random

        class Game:
            def __init__(self):
                self.reset()
                
            def reset(self):
                self.board = [[0]*4 for _ in range(4)]
                self.score = 0
                self.add_tile()
                self.add_tile()
                self.render()

            def add_tile(self):
                empty = [(r, c) for r in range(4) for c in range(4) if self.board[r][c] == 0]
                if empty:
                    r, c = random.choice(empty)
                    self.board[r][c] = 2 if random.random() < 0.9 else 4

            def move(self, direction):
                # 0:left, 1:down, 2:right, 3:up
                original = [row[:] for row in self.board]
                for _ in range(direction):
                    self.board = [list(r) for r in zip(*self.board[::-1])]
                
                moved = False
                for i in range(4):
                    row = [x for x in self.board[i] if x != 0]
                    for j in range(len(row)-1):
                        if row[j] == row[j+1]:
                            row[j] *= 2
                            self.score += row[j]
                            row[j+1] = 0
                    row = [x for x in row if x != 0]
                    row += [0] * (4 - len(row))
                    if self.board[i] != row: moved = True
                    self.board[i] = row

                for _ in range((4 - direction) % 4):
                    self.board = [list(r) for r in zip(*self.board[::-1])]
                
                if moved:
                    self.add_tile()
                    self.render()

            def render(self):
                grid = document.getElementById("grid-container")
                grid.innerHTML = ""
                for r in range(4):
                    for c in range(4):
                        val = self.board[r][c]
                        div = document.createElement("div")
                        div.className = f"cell n-{val}" if val else "cell"
                        div.innerText = str(val) if val else ""
                        grid.appendChild(div)
                document.getElementById("score").innerText = str(self.score)

        game = Game()

        # 事件监听
        def on_key(e):
            keys = {"ArrowLeft":0, "ArrowDown":1, "ArrowRight":2, "ArrowUp":3}
            if e.key in keys:
                e.preventDefault()
                game.move(keys[e.key])

        # 触摸逻辑
        ts = {"x": 0, "y": 0}
        def on_touchstart(e):
            ts["x"] = e.touches[0].clientX
            ts["y"] = e.touches[0].clientY

        def on_touchend(e):
            dx = e.changedTouches[0].clientX - ts["x"]
            dy = e.changedTouches[0].clientY - ts["y"]
            if abs(dx) > 30 or abs(dy) > 30:
                if abs(dx) > abs(dy):
                    game.move(0 if dx < 0 else 2)
                else:
                    game.move(3 if dy < 0 else 1)

        document.addEventListener("keydown", on_key)
        document.addEventListener("touchstart", on_touchstart)
        document.addEventListener("touchend", on_touchend)
        document.getElementById("reset-btn").onclick = lambda e: game.reset()
    </script>
</body>
</html>
