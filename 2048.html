<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open Source 2048 - Python</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --cell-empty: rgba(238, 228, 218, 0.35);
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background: var(--bg-color);
            color: var(--text-dark);
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            touch-action: none; /* 禁用默认手势 */
        }

        .container { width: 90vw; max-width: 400px; margin-top: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-box { background: var(--grid-bg); padding: 5px 15px; border-radius: 5px; color: white; text-align: center; }
        .score-label { font-size: 12px; text-transform: uppercase; }
        .score-val { font-size: 20px; font-weight: bold; }

        #grid {
            width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            background: var(--grid-bg);
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .cell {
            background: var(--cell-empty);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.1s;
        }

        /* 2048 开源经典配色 */
        .n-2 { background: #eee4da; color: var(--text-dark); }
        .n-4 { background: #ede0c8; color: var(--text-dark); }
        .n-8 { background: #f2b179; color: var(--text-light); }
        .n-16 { background: #f59563; color: var(--text-light); }
        .n-32 { background: #f67c5f; color: var(--text-light); }
        .n-64 { background: #f65e3b; color: var(--text-light); }
        .n-128 { background: #edcf72; color: var(--text-light); font-size: 24px; }
        .n-256 { background: #edcc61; color: var(--text-light); font-size: 24px; }
        .n-512 { background: #edc850; color: var(--text-light); font-size: 24px; }
        .n-1024 { background: #edc53f; color: var(--text-light); font-size: 18px; }
        .n-2048 { background: #edc22e; color: var(--text-light); font-size: 18px; }

        .controls { margin-top: 20px; }
        .restart-btn {
            background: #8f7a66; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 style="font-size: 48px; margin: 0;">2048</h1>
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div id="score" class="score-val">0</div>
            </div>
        </div>
        
        <div id="grid"></div>

        <div class="controls">
            <button class="restart-btn" id="restart">New Game</button>
        </div>
    </div>

    <script type="py">
        from pyscript import document, window
        import random

        class Game2048:
            def __init__(self):
                self.grid = [[0]*4 for _ in range(4)]
                self.score = 0
                self.start_game()

            def start_game(self):
                self.grid = [[0]*4 for _ in range(4)]
                self.score = 0
                self.add_new_tile()
                self.add_new_tile()
                self.render()

            def add_new_tile(self):
                empty_cells = [(r, c) for r in range(4) for c in range(4) if self.grid[r][c] == 0]
                if empty_cells:
                    r, c = random.choice(empty_cells)
                    self.grid[r][c] = 2 if random.random() < 0.9 else 4

            def compress(self, row):
                new_row = [i for i in row if i != 0]
                new_row += [0] * (4 - len(new_row))
                return new_row

            def merge(self, row):
                for i in range(3):
                    if row[i] != 0 and row[i] == row[i+1]:
                        row[i] *= 2
                        self.score += row[i]
                        row[i+1] = 0
                return row

            def move_left(self):
                old_grid = [r[:] for r in self.grid]
                for i in range(4):
                    res = self.compress(self.grid[i])
                    res = self.merge(res)
                    self.grid[i] = self.compress(res)
                return old_grid != self.grid

            def rotate_grid(self):
                self.grid = [list(row) for row in zip(*self.grid[::-1])]

            def move(self, direction):
                # 0:left, 1:down, 2:right, 3:up (与你之前的逻辑一致)
                changed = False
                for _ in range(direction):
                    self.rotate_grid()
                
                changed = self.move_left()
                
                for _ in range((4 - direction) % 4):
                    self.rotate_grid()
                
                if changed:
                    self.add_new_tile()
                    self.render()
                    if self.is_game_over():
                        window.alert(f"游戏结束！最终得分: {self.score}")

            def is_game_over(self):
                # 检查是否有空位
                if any(0 in row for row in self.grid): return False
                # 检查水平/垂直是否有可合并项
                for r in range(4):
                    for c in range(3):
                        if self.grid[r][c] == self.grid[r][c+1] or self.grid[c][r] == self.grid[c+1][r]:
                            return False
                return True

            def render(self):
                grid_div = document.getElementById("grid")
                grid_div.innerHTML = ""
                for r in range(4):
                    for c in range(4):
                        val = self.grid[r][c]
                        cell = document.createElement("div")
                        cell.className = f"cell n-{val}" if val else "cell"
                        cell.innerText = str(val) if val else ""
                        grid_div.appendChild(cell)
                document.getElementById("score").innerText = str(self.score)

        # 初始化游戏
        game = Game2048()

        # 事件监听
        def on_keydown(e):
            keys = {"ArrowLeft": 0, "ArrowDown": 1, "ArrowRight": 2, "ArrowUp": 3}
            if e.key in keys:
                e.preventDefault()
                game.move(keys[e.key])

        # 触摸逻辑
        ts_x, ts_y = 0, 0
        def on_touchstart(e):
            global ts_x, ts_y
            ts_x = e.touches.item(0).clientX
            ts_y = e.touches.item(0).clientY

        def on_touchend(e):
            te_x = e.changedTouches.item(0).clientX
            te_y = e.changedTouches.item(0).clientY
            dx, dy = te_x - ts_x, te_y - ts_y
            if abs(dx) > 30 or abs(dy) > 30:
                if abs(dx) > abs(dy):
                    game.move(0 if dx < 0 else 2)
                else:
                    game.move(3 if dy < 0 else 1)

        document.addEventListener("keydown", on_keydown)
        document.addEventListener("touchstart", on_touchstart)
        document.addEventListener("touchend", on_touchend)
        document.getElementById("restart").onclick = lambda e: game.start_game()
    </script>
</body>
</html>
