<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Python Fix</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background: #faf8ef; color: #776e65; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        .score-container { background: #bbada0; padding: 10px 25px; border-radius: 6px; color: white; margin: 10px; }
        #grid { width: 320px; height: 320px; background: #bbada0; border-radius: 6px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }
        .cell { background: rgba(238, 228, 218, 0.35); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .n-2 { background: #eee4da; } .n-4 { background: #ede0c8; } .n-8 { background: #f2b179; color: white; }
        .n-16 { background: #f59563; color: white; } .n-32 { background: #f67c5f; color: white; }
        .btn { margin: 10px; padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="score-container">分数: <span id="score">0</span></div>
    <div id="grid"></div>
    <div class="controls">
        <button class="btn" onclick="window.dispatchEvent(new KeyboardEvent('keydown', {key: 'ArrowUp'}))">↑</button><br>
        <button class="btn" onclick="window.dispatchEvent(new KeyboardEvent('keydown', {key: 'ArrowLeft'}))">←</button>
        <button class="btn" onclick="window.dispatchEvent(new KeyboardEvent('keydown', {key: 'ArrowDown'}))">↓</button>
        <button class="btn" onclick="window.dispatchEvent(new KeyboardEvent('keydown', {key: 'ArrowRight'}))">→</button>
    </div>
    <button class="btn" id="restart">再来一局</button>

    <script type="py">
        from pyscript import document
        import random

        board = [[0]*4 for _ in range(4)]
        score = 0

        def init_game():
            global board, score
            board = [[0]*4 for _ in range(4)]
            score = 0
            add_tile()
            add_tile()
            render()

        def add_tile():
            empty = [(r, c) for r in range(4) for c in range(4) if board[r][c] == 0]
            if empty:
                r, c = random.choice(empty)
                board[r][c] = 2 if random.random() < 0.9 else 4

        def render():
            grid = document.getElementById("grid")
            grid.innerHTML = ""
            for r in range(4):
                for c in range(4):
                    v = board[r][c]
                    div = document.createElement("div")
                    div.className = f"cell n-{v}" if v else "cell"
                    div.innerText = str(v) if v else ""
                    grid.appendChild(div)
            document.getElementById("score").innerText = str(score)

        def move(direction):
            global board, score
            # 0:left, 1:down, 2:right, 3:up
            def rotate(b): return [list(r) for r in zip(*b[::-1])]
            
            temp_board = [row[:] for row in board]
            for _ in range(direction): temp_board = rotate(temp_board)
            
            moved = False
            new_board = []
            for row in temp_board:
                line = [x for x in row if x != 0]
                for i in range(len(line)-1):
                    if line[i] == line[i+1]:
                        line[i] *= 2
                        score += line[i]
                        line[i+1] = 0
                line = [x for x in line if x != 0]
                line += [0] * (4 - len(line))
                if line != row: moved = True
                new_board.append(line)
            
            for _ in range((4 - direction) % 4): new_board = rotate(new_board)
            
            if moved:
                board = new_board
                add_tile()
                render()

        def on_key(e):
            d = {"ArrowLeft":0, "ArrowDown":1, "ArrowRight":2, "ArrowUp":3}
            if e.key in d:
                e.preventDefault()
                move(d[e.key])

        document.addEventListener("keydown", on_key)
        document.getElementById("restart").onclick = lambda e: init_game()
        init_game()
    </script>
</body>
</html>
