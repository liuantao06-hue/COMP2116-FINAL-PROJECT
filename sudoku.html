<script type="py">
    from pyscript import document
    import random

    class Sudoku:
        def __init__(self):
            self.selected_cell = None
            self.reset()

        def is_valid(self, board, r, c, n):
            # Check row
            for i in range(9):
                if board[r][i] == n: return False
            # Check column
            for i in range(9):
                if board[i][c] == n: return False
            # Check 3x3 box
            start_r, start_c = 3 * (r // 3), 3 * (c // 3)
            for i in range(3):
                for j in range(3):
                    if board[start_r + i][start_c + j] == n: return False
            return True

        def solve(self, board):
            for r in range(9):
                for c in range(9):
                    if board[r][c] == 0:
                        nums = list(range(1, 10))
                        random.shuffle(nums)
                        for n in nums:
                            if self.is_valid(board, r, c, n):
                                board[r][c] = n
                                if self.solve(board): return True
                                board[r][c] = 0
                        return False
            return True

        def generate_board(self):
            # 1. Start with empty board
            board = [[0 for _ in range(9)] for _ in range(9)]
            # 2. Fully solve it
            self.solve(board)
            # 3. Remove numbers (e.g., keep 30-35 numbers for 'Medium' difficulty)
            # Higher number = easier game
            attempts = 45 
            while attempts > 0:
                r, c = random.randint(0, 8), random.randint(0, 8)
                if board[r][c] != 0:
                    board[r][c] = 0
                    attempts -= 1
            return board

        def reset(self):
            # Generate a new random board
            self.board = self.generate_board()
            self.fixed = [[bool(c) for c in r] for r in self.board]
            self.selected_cell = None
            self.render()

        def render(self):
            grid_div = document.getElementById("grid")
            grid_div.innerHTML = ""
            for r in range(9):
                for c in range(9):
                    cell = document.createElement("div")
                    cell.className = "cell" + (" fixed" if self.fixed[r][c] else "")
                    if (r, c) == self.selected_cell: 
                        cell.classList.add("selected")
                    
                    val = self.board[r][c]
                    cell.innerText = str(val) if val else ""
                    cell.onclick = self.make_select_handler(r, c)
                    grid_div.appendChild(cell)

        def make_select_handler(self, r, c):
            def handler(e):
                if not self.fixed[r][c]:
                    self.selected_cell = (r, c)
                    self.render()
            return handler

        def set_num(self, n):
            if self.selected_cell:
                r, c = self.selected_cell
                self.board[r][c] = n
                self.render()

    game = Sudoku()

    def init_numpad():
        pad = document.getElementById("numpad")
        pad.innerHTML = "" # Clear pad on re-init
        for i in range(1, 10):
            btn = document.createElement("button")
            btn.className = "num-btn"
            btn.innerText = str(i)
            btn.onclick = lambda e, val=i: game.set_num(val)
            pad.appendChild(btn)
        
        btn_clear = document.createElement("button")
        btn_clear.className = "num-btn clear"
        btn_clear.innerText = "C"
        btn_clear.onclick = lambda e: game.set_num(0)
        pad.appendChild(btn_clear)

    init_numpad()
    document.getElementById("restart").onclick = lambda e: game.reset()
</script>
