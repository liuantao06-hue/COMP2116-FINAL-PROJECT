<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Master - Python Pro</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root {
            --green: #6aaa64;
            --yellow: #c9b458;
            --gray: #787c7e;
            --border: #d3d6da;
            --dark: #1a1a1b;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--dark); }
        
        h2 { letter-spacing: 2px; margin-bottom: 30px; }

        #board { display: flex; flex-direction: column; gap: 5px; margin-bottom: 25px; }
        .row { display: flex; gap: 5px; }
        .tile {
            width: 58px; height: 58px; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: bold; text-transform: uppercase;
            color: white; border-radius: 2px; transition: transform 0.4s;
        }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        input { 
            padding: 12px; font-size: 20px; border: 2px solid var(--border); 
            border-radius: 4px; width: 200px; text-align: center; 
            text-transform: uppercase; outline: none;
        }
        input:focus { border-color: var(--gray); }
        
        button { 
            padding: 12px 24px; border: none; border-radius: 4px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: opacity 0.2s;
        }
        #enter-btn { background: var(--dark); color: white; }
        #restart-btn { background: var(--green); color: white; margin-top: 10px; display: none; }
        button:hover { opacity: 0.9; }

        #msg { margin-top: 20px; font-weight: bold; font-size: 18px; }
        .feedback { font-size: 14px; color: #666; margin-top: 8px; font-style: italic; }
    </style>
</head>
<body>

    <h2>WORDLE</h2>

    <div id="board"></div>

    <div class="controls">
        <input type="text" id="guess-input" maxlength="5" placeholder="GUESS" autocomplete="off">
        <button id="enter-btn">Submit Guess</button>
        <div id="msg"></div>
        <div id="feedback-list" class="feedback"></div>
        <button id="restart-btn">Play Again</button>
    </div>

    <script type="py">
        from pyscript import document, window
        import random

        # Expanded English word list
        WORDS = ["APPLE", "BREAD", "CHASE", "DAILY", "EARTH", "FRUIT", "GLASS", "HOUSE", "INDEX", 
                 "JUDGE", "KNIFE", "LEMON", "MUSIC", "NIGHT", "OCEAN", "PAPER", "QUIET", "RADIO", 
                 "SMILE", "TABLE", "UNDER", "VOICE", "WATER", "YOUTH", "BRAIN", "LIGHT", "PLANT"]
        
        target = ""
        attempts = 0

        def start_game():
            global target, attempts
            target = random.choice(WORDS)
            attempts = 0
            document.getElementById("board").innerHTML = ""
            document.getElementById("msg").innerText = "Enter a 5-letter word"
            document.getElementById("feedback-list").innerText = ""
            document.getElementById("guess-input").disabled = False
            document.getElementById("guess-input").value = ""
            document.getElementById("restart-btn").style.display = "none"
            document.getElementById("enter-btn").style.display = "block"

        def check_guess(e=None):
            global attempts
            inp = document.getElementById("guess-input")
            guess = inp.value.upper().strip()
            
            if len(guess) != 5:
                document.getElementById("msg").innerText = "⚠️ Please enter 5 letters!"
                return

            row = document.createElement("div")
            row.className = "row"
            
            # Count character frequency in target for accurate yellow/green highlighting
            target_chars = list(target)
            res_colors = [None] * 5
            
            # Pass 1: Mark Greens (Correct position)
            for i in range(5):
                if guess[i] == target[i]:
                    res_colors[i] = "var(--green)"
                    target_chars[i] = None # Mark as used

            # Pass 2: Mark Yellows (Wrong position) or Grays (Not in word)
            for i in range(5):
                if res_colors[i] is None:
                    if guess[i] in target_chars:
                        res_colors[i] = "var(--yellow)"
                        target_chars[target_chars.index(guess[i])] = None # Mark as used
                    else:
                        res_colors[i] = "var(--gray)"

            # Render the row tiles
            for i in range(5):
                tile = document.createElement("div")
                tile.className = "tile"
                tile.innerText = guess[i]
                tile.style.background = res_colors[i]
                tile.style.borderColor = res_colors[i]
                row.appendChild(tile)

            document.getElementById("board").appendChild(row)
            attempts += 1
            inp.value = ""
            
            # Update Feedback
            correct_count = sum(1 for i in range(5) if guess[i] == target[i])
            exist_count = sum(1 for i in range(5) if guess[i] != target[i] and guess[i] in target)
            
            if guess == target:
                document.getElementById("msg").innerText = f"🎉 Genius! It was {target}!"
                end_game()
            elif attempts >= 6:
                document.getElementById("msg").innerText = f"❌ Game Over! The word was {target}"
                end_game()
            else:
                document.getElementById("msg").innerText = f"Attempt {attempts} of 6"
                document.getElementById("feedback-list").innerText = f"Last Guess: {correct_count} exact, {exist_count} misplaced"

        def end_game():
            document.getElementById("guess-input").disabled = True
            document.getElementById("enter-btn").style.display = "none"
            document.getElementById("restart-btn").style.display = "block"

        # Event Listeners
        document.getElementById("enter-btn").onclick = check_guess
        document.getElementById("restart-btn").onclick = lambda e: start_game()
        
        def on_kp(e):
            if e.key == "Enter": check_guess()
        document.getElementById("guess-input").onkeypress = on_kp
        
        start_game()
    </script>
</body>
</html>
