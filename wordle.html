<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Master</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root {
            --green: #6aaa64;
            --yellow: #c9b458;
            --gray: #787c7e;
            --border: #d3d6da;
        }
        body { font-family: sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #board { display: flex; flex-direction: column; gap: 5px; margin-bottom: 20px; }
        .row { display: flex; gap: 5px; }
        .tile {
            width: 50px; height: 50px; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; text-transform: uppercase;
            color: white; border-radius: 4px; transition: 0.3s;
        }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input { padding: 10px; font-size: 18px; border: 2px solid var(--border); border-radius: 4px; width: 160px; text-align: center; text-transform: uppercase; }
        
        button { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #enter-btn { background: #1a1a1b; color: white; }
        #restart-btn { background: var(--green); color: white; margin-top: 10px; display: none; }

        #msg { margin-top: 15px; font-weight: bold; text-align: center; }
        .feedback { font-size: 14px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>WORDLE</h2>

    <div id="board"></div>

    <div class="controls">
        <input type="text" id="guess-input" maxlength="5" placeholder="GUESS" autocomplete="off">
        <button id="enter-btn">SUBMIT</button>
        <div id="msg"></div>
        <div id="feedback-list" class="feedback"></div>
        <button id="restart-btn">PLAY AGAIN</button>
    </div>

    <script type="py">
        from pyscript import document, window
        import random

        WORDS = ["APPLE", "BREAD", "CHASE", "DAILY", "EARTH", "FRUIT", "GLASS", "HOUSE", "INDEX", "JUDGE", "KNIFE", "LEMON", "MUSIC", "NIGHT", "OCEAN", "PAPER", "QUIET", "RADIO", "SMILE", "TABLE", "UNDER", "VOICE", "WATER", "YOUTH"]
        target = ""
        attempts = 0

        def start_game():
            global target, attempts
            target = random.choice(WORDS)
            attempts = 0
            document.getElementById("board").innerHTML = ""
            document.getElementById("msg").innerText = "Type a 5-letter word"
            document.getElementById("feedback-list").innerText = ""
            document.getElementById("guess-input").disabled = False
            document.getElementById("guess-input").value = ""
            document.getElementById("restart-btn").style.display = "none"
            document.getElementById("enter-btn").style.display = "block"

        def check_guess(e=None):
            global attempts
            inp = document.getElementById("guess-input")
            guess = inp.value.upper()
            
            if len(guess) != 5:
                document.getElementById("msg").innerText = "⚠️ Needs 5 letters!"
                return

            row = document.createElement("div")
            row.className = "row"
            
            # 统计目标单词中字母的数量，用于处理重复字母的黄色提示
            target_chars = list(target)
            
            # 第一遍：标记绿色（位置正确）
            res_colors = [None] * 5
            for i in range(5):
                if guess[i] == target[i]:
                    res_colors[i] = "var(--green)"
                    target_chars[i] = None # 标记已用

            # 第二遍：标记黄色（存在但位置错）或灰色
            for i in range(5):
                if res_colors[i] is None:
                    if guess[i] in target_chars:
                        res_colors[i] = "var(--yellow)"
                        target_chars[target_chars.index(guess[i])] = None # 标记已用
                    else:
                        res_colors[i] = "var(--gray)"

            # 渲染行
            for i in range(5):
                tile = document.createElement("div")
                tile.className = "tile"
                tile.innerText = guess[i]
                tile.style.background = res_colors[i]
                tile.style.borderColor = res_colors[i]
                row.appendChild(tile)

            document.getElementById("board").appendChild(row)
            attempts += 1
            inp.value = ""
            
            # 给出对/错的文字提示
            correct_count = sum(1 for i in range(5) if guess[i] == target[i])
            exist_count = sum(1 for i in range(5) if guess[i] != target[i] and guess[i] in target)
            
            if guess == target:
                document.getElementById("msg").innerText = f"🎉 Perfect! It's {target}!"
                end_game()
            elif attempts >= 6:
                document.getElementById("msg").innerText = f"❌ Out of tries! It was {target}"
                end_game()
            else:
                document.getElementById("msg").innerText = f"Try {attempts+1} / 6"
                document.getElementById("feedback-list").innerText = f"Matches: {correct_count} correct, {exist_count} misplaced"

        def end_game():
            document.getElementById("guess-input").disabled = True
            document.getElementById("enter-btn").style.display = "none"
            document.getElementById("restart-btn").style.display = "block"

        # 绑定事件
        document.getElementById("enter-btn").onclick = check_guess
        document.getElementById("restart-btn").onclick = lambda e: start_game()
        
        def on_kp(e):
            if e.key == "Enter": check_guess()
        document.getElementById("guess-input").onkeypress = on_kp
        
        start_game()
    </script>
</body>
</html>
