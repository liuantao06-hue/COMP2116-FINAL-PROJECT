<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Python</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root {
            --green: #6aaa64;
            --yellow: #c9b458;
            --gray: #787c7e;
            --border: #d3d6da;
            --bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        h2 { color: #1a1a1b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }

        /* Board Styling */
        #board { display: flex; flex-direction: column; gap: 5px; margin-bottom: 20px; }
        .row { display: flex; gap: 5px; }
        .tile {
            width: 50px; height: 50px; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; text-transform: uppercase;
            color: white; border-radius: 4px;
            animation: pop 0.2s linear;
        }
        @keyframes pop { 50% { transform: scale(1.1); } }

        /* Input Controls */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input { 
            padding: 12px; font-size: 18px; border: 2px solid var(--border); 
            border-radius: 4px; width: 150px; text-align: center; text-transform: uppercase;
            outline: none;
        }
        input:focus { border-color: #888; }
        
        .btn-group { display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; border: none; border-radius: 4px; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        #submit-btn { background: #1a1a1b; color: white; }
        #submit-btn:hover { background: #333; }
        #hint-btn { background: #efefef; color: #1a1a1b; border: 1px solid #ccc; }
        #restart { background: #6aaa64; color: white; margin-top: 10px; }

        #msg { margin-top: 20px; font-weight: bold; color: #1a1a1b; height: 24px; }
        #hint-msg { font-size: 14px; color: var(--gray); margin-top: 5px; }
    </style>
</head>
<body>

    <h2>Wordle</h2>

    <div id="board"></div>

    <div class="controls">
        <input type="text" id="guess-input" maxlength="5" placeholder="5 Letters" autocomplete="off">
        <div class="btn-group">
            <button id="submit-btn">ENTER</button>
            <button id="hint-btn">HINT</button>
        </div>
        <div id="msg"></div>
        <div id="hint-msg"></div>
        <button id="restart" style="display: none;">PLAY AGAIN</button>
    </div>

    <script type="py">
        from pyscript import document, window
        import random

        # Simple word list
        WORDS = ["APPLE", "BEACH", "BRAIN", "CLOUD", "DREAM", "FLAME", "GRAPE", "HEART", "LIGHT", "MUSIC", "OCEAN", "PIZZA", "SMILE", "TIGER", "WATER", "WORLD", "YOUNG"]
        target = ""
        attempts = 0
        hints_used = 0

        def start_game():
            global target, attempts, hints_used
            target = random.choice(WORDS)
            attempts = 0
            hints_used = 0
            document.getElementById("board").innerHTML = ""
            document.getElementById("msg").innerText = ""
            document.getElementById("hint-msg").innerText = ""
            document.getElementById("guess-input").disabled = False
            document.getElementById("guess-input").value = ""
            document.getElementById("guess-input").focus()
            document.getElementById("hint-btn").disabled = False
            document.getElementById("restart").style.display = "none"
            document.getElementById("submit-btn").disabled = False

        def submit_guess(e=None):
            global attempts
            guess_input = document.getElementById("guess-input")
            guess = guess_input.value.upper()
            
            if len(guess) != 5:
                document.getElementById("msg").innerText = "Must be 5 letters!"
                return
            
            document.getElementById("msg").innerText = ""
            row = document.createElement("div")
            row.className = "row"
            
            for i in range(5):
                tile = document.createElement("div")
                tile.className = "tile"
                char = guess[i]
                tile.innerText = char
                
                if char == target[i]:
                    tile.style.background = "var(--green)"
                    tile.style.borderColor = "var(--green)"
                elif char in target:
                    tile.style.background = "var(--yellow)"
                    tile.style.borderColor = "var(--yellow)"
                else:
                    tile.style.background = "var(--gray)"
                    tile.style.borderColor = "var(--gray)"
                row.appendChild(tile)
            
            document.getElementById("board").appendChild(row)
            attempts += 1
            guess_input.value = ""
            guess_input.focus()
            
            if guess == target:
                document.getElementById("msg").innerText = f"Splendid! {attempts} tries! 🎉"
                end_game()
            elif attempts >= 6:
                document.getElementById("msg").innerText = f"Game Over! Answer: {target}"
                end_game()

        def get_hint(e):
            global hints_used
            if hints_used < 3:
                pos = random.randint(0, 4)
                letter = target[pos]
                hints_used += 1
                document.getElementById("hint-msg").innerText = f"Hint {hints_used}/3: Pos {pos+1} is '{letter}'"
            if hints_used >= 3:
                document.getElementById("hint-btn").disabled = True

        def end_game():
            document.getElementById("guess-input").disabled = True
            document.getElementById("submit-btn").disabled = True
            document.getElementById("restart").style.display = "block"

        # Listeners
        document.getElementById("submit-btn").onclick = submit_guess
        document.getElementById("hint-btn").onclick = get_hint
        document.getElementById("restart").onclick = lambda e: start_game()
        
        def handle_keypress(e):
            if e.key == "Enter":
                submit_guess()
        document.getElementById("guess-input").onkeypress = handle_keypress
        
        start_game()
    </script>
</body>
</html>
